<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #dbeafe, #fce7f3);
      color: #333;
    }

    .container {
      width: 60%;
      margin: 50px auto;
    }

    .card {
      background: linear-gradient(135deg, #e0f2fe, #fbcfe8);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .profile {
      display: flex;
      align-items: center;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #93c5fd, #f9a8d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      margin-right: 20px;
      color: white;
    }

    .name {
      font-size: 26px;
      font-weight: bold;
      color: #1e3a8a;
    }

    .enroll {
      color: #555;
      margin-top: 5px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 15px;
      border-radius: 20px;
      background: #bfdbfe;
      font-size: 12px;
      color: #1e3a8a;
    }

    .assignment {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: linear-gradient(135deg, #93c5fd, #f9a8d4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-weight: bold;
      color: white;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
    }

    .subtitle {
      color: #555;
      font-size: 14px;
    }

    .btn {
      background: linear-gradient(135deg, #93c5fd, #f9a8d4);
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.85;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- Profile Card -->
  <div class="card">
    <div class="profile">
      <div class="avatar">SK</div>
      <div>
        <div class="name">Sachapara Khushi</div>
        <div class="enroll">Enrollment: 20230905090029</div>
        <div class="badge">CRYPTOGRAPHY AND NETWORK SECURITY</div>
      </div>
    </div>
  </div>

  <!-- ALA 1 -->
  <div class="card assignment">
    <div class="left">
      <div class="icon">A1</div>
      <div>
        <div class="title">ALA 1</div>
        <div class="subtitle"> ALA 1 PDF Report</div>
      </div>
    </div>
   <button class="btn"><a href="https://raw.githubusercontent.com/Sachapara/CNS-ALA/main/ALA-1.pdf" target="_blank" class="btn">View PDF</a></button>
  </div>
  </div>

  <!-- ALA 2 -->
  <div class="card assignment">
    <div class="left">
      <div class="icon">A2</div>
      <div>
        <div class="title">ALA 2</div>
        <div class="subtitle">ALA 2 PDF Report</div>
      </div>
    </div>
    <button class="btn">View PDF</button>
  </div>

  <!-- ALA 3 --> 
  <div class="card assignment">
    <div class="left">
      <div class="icon">A3</div>
      <div>
        <div class="title">ALA 3</div>
        <div class="subtitle"> ALA 3 PDF Report</div>
      </div>
    </div>
    <button class="btn">View PDF</button>
  </div>

</div>

</body>
</html>
